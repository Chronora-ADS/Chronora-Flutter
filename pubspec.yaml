name: chronora
description: Front-end Chronora com Flutter e conectado ao Back-end Spring Boot

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  universal_html: ^2.2.1
  file_picker: ^9.0.0
  shared_preferences: ^2.5.3
  provider: ^6.1.5+1
  image_picker: ^1.2.1
  camera: ^0.11.0+2
  intl: ^0.20.2
  qr_flutter: ^4.1.0
  app_links: ^6.3.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/img/LogoBackgroundYellow.png"

flutter:
  uses-material-design: true

  assets:
    - assets/img/
