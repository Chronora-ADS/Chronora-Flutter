name: Frontend CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  analyze-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Analisar projeto
        run: flutter analyze

      - name: Rodar testes
        run: flutter test

      - name: Gerar build web
        run: flutter build web --release --dart-define=API_BASE_URL=https://example.com
