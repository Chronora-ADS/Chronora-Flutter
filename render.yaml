services:
  - type: web
    name: chronora-flutter-prod
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: 10000
      - key: API_BASE_URL
        sync: false
